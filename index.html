<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Claude 101 — курс</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0e1621);
    --card: var(--tg-theme-secondary-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #f2f4f6);
    --muted: var(--tg-theme-hint-color, #708499);
    --accent: #d97757;
    --accent-dim: rgba(217, 119, 87, .14);
    --ok: #35c76f;
    --ok-dim: rgba(53, 199, 111, .12);
    --bad: #e05c4b;
    --bad-dim: rgba(224, 92, 75, .12);
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, "SF Pro Text", Roboto, "Segoe UI", sans-serif;
    -webkit-tap-highlight-color: transparent; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  .kicker { font: 600 12px var(--mono); letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px; }
  h1 { font-size: 24px; line-height: 1.2; margin-bottom: 6px; }
  .hello { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  /* список уроков */
  .lesson-item { background: var(--card); border-radius: 16px; padding: 15px 16px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 13px; cursor: pointer;
    border: 1px solid transparent; }
  .lesson-item:active { transform: scale(.98); }
  .lesson-item.done { border-color: rgba(53, 199, 111, .3); }
  .ln { width: 38px; height: 38px; border-radius: 12px; flex: none;
    background: var(--accent-dim); color: var(--accent);
    display: grid; place-items: center; font: 700 16px var(--mono); }
  .lesson-item.done .ln { background: var(--ok-dim); color: var(--ok); }
  .li-t { flex: 1; min-width: 0; }
  .li-t .name { font-weight: 600; font-size: 15px; }
  .li-t .sub { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .chev { color: var(--muted); flex: none; }

  .totalbar { height: 6px; border-radius: 3px; background: rgba(255,255,255,.08);
    overflow: hidden; margin: 4px 0 18px; }
  .totalbar i { display: block; height: 100%; background: var(--accent);
    border-radius: 3px; transition: width .5s; }

  /* экран урока */
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent);
    font-size: 14px; font-weight: 600; margin-bottom: 14px; cursor: pointer; user-select: none; }
  .card { background: var(--card); border-radius: 16px; padding: 18px 16px; margin-bottom: 14px; }
  .card h2 { font-size: 16.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 9px; }
  .num { width: 26px; height: 26px; border-radius: 9px; flex: none;
    background: var(--accent-dim); color: var(--accent);
    display: grid; place-items: center; font: 700 13px var(--mono); }
  .card p { color: var(--muted); font-size: 14px; margin-bottom: 9px; }
  .card p:last-child { margin-bottom: 0; }
  .card b { color: var(--text); font-weight: 600; }
  .card ul { margin: 0 0 9px 18px; color: var(--muted); font-size: 14px; }
  .card li { margin-bottom: 5px; }

  .ex { background: rgba(255,255,255,.04); border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0; padding: 10px 12px; margin: 10px 0;
    font: 13px/1.5 var(--mono); }
  .ex.good { border-left-color: var(--ok); }
  .ex.bad { border-left-color: var(--bad); }
  .tip { background: var(--accent-dim); border-radius: 12px; padding: 11px 13px;
    font-size: 13.5px; margin: 10px 0; }
  .tip b { color: var(--accent); }

  /* квиз */
  .q { margin-bottom: 16px; }
  .q .qq { font-weight: 600; font-size: 14.5px; margin-bottom: 9px; }
  .opt { background: rgba(255,255,255,.05); border-radius: 11px; padding: 11px 13px;
    font-size: 14px; margin-bottom: 7px; cursor: pointer; user-select: none;
    border: 1px solid transparent; }
  .opt:active { transform: scale(.98); }
  .opt.right { background: var(--ok-dim); border-color: var(--ok); }
  .opt.wrong { background: var(--bad-dim); border-color: var(--bad); }
  .expl { display: none; font-size: 13px; color: var(--muted);
    padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,.04); }
  .expl.show { display: block; }

  .finish { width: 100%; border: 0; border-radius: 14px; padding: 14px;
    font: 600 15px inherit; font-family: inherit; cursor: pointer;
    background: var(--accent); color: #fff; margin-top: 4px; }
  .finish[disabled] { opacity: .4; }
  .finish.done { background: var(--ok-dim); color: var(--ok); }

  .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; }
  .foot b { color: var(--accent); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="home">
    <div class="kicker">Claude 101 · курс для начинающих</div>
    <h1>Научись работать с ИИ</h1>
    <div class="hello" id="hello">5 уроков — от первого запроса до уверенного пользователя.</div>
    <div class="totalbar"><i id="totalbar" style="width:0%"></i></div>
    <div id="lessonList"></div>
    <div class="foot">Бот-гид по обучению · <b>Claude 101</b></div>
  </div>

  <!-- ЭКРАН УРОКА -->
  <div id="lesson" class="hidden">
    <div class="back" id="backBtn">← Все уроки</div>
    <div class="kicker" id="lKicker"></div>
    <h1 id="lTitle"></h1>
    <div class="hello" id="lSub"></div>
    <div id="lBody"></div>
    <div class="card">
      <h2><span class="num">?</span>Проверь себя</h2>
      <div id="lQuiz"></div>
      <button class="finish" id="finishBtn">Завершить урок</button>
    </div>
    <div class="foot">Урок <span id="lNum"></span> из 5 · <b>Claude 101</b></div>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const u = tg.initDataUnsafe?.user;
if (u?.first_name) {
  document.getElementById("hello").textContent =
    "Привет, " + u.first_name + "! 5 уроков — от первого запроса до уверенного пользователя.";
}

/* ================= КОНТЕНТ ================= */
const LESSONS = [

      ["Чтобы Claude работал усерднее", 0, "Дело не в усердии — дело в разбросе вариантов."]
    ]},
    { q: "Как превратить Claude в репетитора, а не в шпаргалку?", a: [
      ["Попросить задавать вопросы и проверять твои ответы", 1, "Да! Активное вспоминание — самый эффективный способ учить."],
      ["Просто читать его объяснения", 0, "Чтение — пассивно. Проверка знаний работает лучше."]
    ]},
    { q: "Можно ли получить работающую веб-страницу, не умея программировать?", a: [
      ["Да — описать словами, что нужно, и получить готовый файл", 1, "Верно! Эта страница — живое доказательство."],
      ["Нет, без курсов не обойтись", 0, "Уже можно! Описание результата — это и есть новый способ «кодить»."]
    ]}
  ]
},
{
  title: "Продвинутый уровень",
  sub: "Ошибки ИИ, безопасность и приёмы профи",
  body: `

    <p>Самое важное знание курса: ИИ может <b>выдумывать факты</b> — даты, цифры, цитаты, названия книг — и звучать при этом абсолютно уверенно. Это называют «галлюцинациями».</p>
    <ul>
      <li>Факты, деньги, здоровье, законы — <b>проверяй в источниках</b>.</li>
      <li>Спроси: «Насколько ты уверен? Что из этого стоит перепроверить?»</li>
      <li>Для свежих событий проси поискать в интернете — базовые знания модели могли устареть.</li>
    </ul>
    <div class="tip">⚠️ <b>Правило:</b> Claude — блестящий помощник и черновик, но последнее слово в важных решениях — за человеком и первоисточниками.</div>
  </div>
  <div class="card"><h2><span class="num">2</span>Приватность</h2>

/* ================= ЛОГИКА ================= */
const KEY = "claude101_progress";
let progress = {};
try { progress = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) {}
function save() { try { localStorage.setItem(KEY, JSON.stringify(progress)); } catch (e) {} }

const $ = id => document.getElementById(id);
let current = null;

function renderHome() {
  $("home").classList.remove("hidden");
  $("lesson").classList.add("hidden");
  window.scrollTo(0, 0);
  const doneCount = LESSONS.filter((_, i) => progress[i]).length;
  $("totalbar").style.width = (doneCount / LESSONS.length * 100) + "%";
  $("lessonList").innerHTML = LESSONS.map((l, i) => `
    <div class="lesson-item ${progress[i] ? "done" : ""}" data-i="${i}">
      <div class="ln">${progress[i] ? "✓" : i + 1}</div>
      <div class="li-t">
        <div class="name">${l.title}</div>
        <div class="sub">${l.sub}</div>
      </div>
      <div class="chev">›</div>
    </div>`).join("");
  document.querySelectorAll(".lesson-item").forEach(el =>
    el.addEventListener("click", () => openLesson(+el.dataset.i)));
}

function openLesson(i) {
  current = i;
  const l = LESSONS[i];
  $("home").classList.add("hidden");
  $("lesson").classList.remove("hidden");
  window.scrollTo(0, 0);
  $("lKicker").textContent = "Claude 101 · Урок " + (i + 1) + " из 5";
  $("lTitle").textContent = l.title;
  $("lSub").textContent = l.sub;
  $("lNum").textContent = i + 1;
  $("lBody").innerHTML = l.body;

  $("lQuiz").innerHTML = l.quiz.map((q, qi) => `
    <div class="q" data-qi="${qi}">
      <div class="qq">${qi + 1}. ${q.q}</div>
      ${q.a.map((a, ai) => `<div class="opt" data-ai="${ai}">${a[0]}</div>`).join("")}
      <div class="expl"></div>
    </div>`).join("");

  const answered = new Set();
  document.querySelectorAll("#lQuiz .q").forEach(qEl => {
    const qi = +qEl.dataset.qi;
    qEl.querySelectorAll(".opt").forEach(optEl => {
      optEl.addEventListener("click", () => {
        if (answered.has(qi)) return;
        answered.add(qi);
        const ai = +optEl.dataset.ai;
        const [ , correct, expl ] = LESSONS[i].quiz[qi].a[ai];
        optEl.classList.add(correct ? "right" : "wrong");
        if (!correct) {
          qEl.querySelectorAll(".opt").forEach(o => {
            if (LESSONS[i].quiz[qi].a[+o.dataset.ai][1]) o.classList.add("right");
          });
        }
        const explEl = qEl.querySelector(".expl");
        explEl.textContent = expl;
        explEl.classList.add("show");
        if (tg.HapticFeedback) { try {
          tg.HapticFeedback.notificationOccurred(correct ? "success" : "error");
        } catch (e) {} }
        updateFinish(answered.size === LESSONS[i].quiz.length);
      });
    });
  });
  updateFinish(false);
}

function updateFinish(enabled) {
  const btn = $("finishBtn");
  if (progress[current]) {
    btn.disabled = false; btn.classList.add("done");
    btn.textContent = "✓ Урок пройден — вернуться к списку";
  } else {
    btn.classList.remove("done");
    btn.disabled = !enabled;
    btn.textContent = enabled ? "Завершить урок 🎉" : "Ответь на вопросы, чтобы завершить";
  }
}

$("finishBtn").addEventListener("click", () => {
  if (!progress[current]) {
    progress[current] = true; save();
    if (tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred("success"); } catch (e) {} }
  }
  renderHome();
});
$("backBtn").addEventListener("click", renderHome);

renderHome();
</script>
</body>
