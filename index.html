<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Claude 101 — курс</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap&subset=cyrillic" rel="stylesheet">
<style>
  :root {
    --paper: #faf8f4;
    --card: #ffffff;
    --ink: #26241f;
    --muted: #7c776c;
    --line: #e8e3d9;
    --clay: #c65d3b;
    --clay-soft: #f3e3db;
    --sage: #5f7d54;
    --sage-soft: #e6ecdf;
    --bad: #b5402c;
    --bad-soft: #f4ddd7;
    --bubble: #f0ebe1;
    --shadow: 0 1px 2px rgba(38,36,31,.05), 0 6px 24px rgba(38,36,31,.06);
    --display: "Spectral", Georgia, serif;
    --body: "Golos Text", -apple-system, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #211f1c;
      --card: #2b2925;
      --ink: #f0ede5;
      --muted: #9d968a;
      --line: #3a3731;
      --clay: #e08960;
      --clay-soft: #453329;
      --sage: #97b385;
      --sage-soft: #313a2c;
      --bad: #de6a4f;
      --bad-soft: #46302a;
      --bubble: #35322c;
      --shadow: 0 1px 2px rgba(0,0,0,.2), 0 8px 28px rgba(0,0,0,.25);
    }
  }
  :root[data-theme="dark"] {
    --paper: #211f1c; --card: #2b2925; --ink: #f0ede5; --muted: #9d968a;
    --line: #3a3731; --clay: #e08960; --clay-soft: #453329;
    --sage: #97b385; --sage-soft: #313a2c; --bad: #de6a4f; --bad-soft: #46302a;
    --bubble: #35322c;
    --shadow: 0 1px 2px rgba(0,0,0,.2), 0 8px 28px rgba(0,0,0,.25);
  }
  :root[data-theme="light"] {
    --paper: #faf8f4; --card: #ffffff; --ink: #26241f; --muted: #7c776c;
    --line: #e8e3d9; --clay: #c65d3b; --clay-soft: #f3e3db;
    --sage: #5f7d54; --sage-soft: #e6ecdf; --bad: #b5402c; --bad-soft: #f4ddd7;
    --bubble: #f0ebe1;
    --shadow: 0 1px 2px rgba(38,36,31,.05), 0 6px 24px rgba(38,36,31,.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--paper); color: var(--ink);
    font: 400 15.5px/1.6 var(--body);
    -webkit-tap-highlight-color: transparent; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 26px 18px 44px; }

  /* ---------- общие ---------- */
  .eyebrow { font: 500 11.5px/1 var(--mono); letter-spacing: .18em;
    text-transform: uppercase; color: var(--clay); margin-bottom: 10px; }
  h1 { font: 600 30px/1.15 var(--display); letter-spacing: -.01em;
    text-wrap: balance; margin-bottom: 8px; }
  .lede { color: var(--muted); font-size: 15px; margin-bottom: 24px; max-width: 40ch; }

  .spark { display: inline-block; width: 34px; height: 34px; margin-bottom: 14px; }
  .spark svg { width: 100%; height: 100%; display: block; }
  @media (prefers-reduced-motion: no-preference) {
    .spark svg { animation: spin 40s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .view { animation: rise .35s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } }
  }

  /* ---------- прогресс ---------- */
  .progress { display: flex; gap: 5px; margin-bottom: 26px; }
  .progress span { height: 4px; flex: 1; border-radius: 2px; background: var(--line); }
  .progress span.done { background: var(--clay); }
  .progress-label { font: 500 11.5px var(--mono); color: var(--muted);
    letter-spacing: .08em; margin: -18px 0 26px; }

  /* ---------- список уроков ---------- */
  .toc { display: flex; flex-direction: column; gap: 10px; }
  .lesson-item { background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px 16px 16px 18px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 16px; cursor: pointer;
    transition: transform .12s ease; }
  .lesson-item:active { transform: scale(.98); }
  .ln { font: 600 26px/1 var(--display); color: var(--clay);
    min-width: 30px; text-align: center; font-variant-numeric: tabular-nums; }
  .lesson-item.done .ln { color: var(--sage); }
  .li-t { flex: 1; min-width: 0; }
  .li-t .name { font: 600 16px/1.3 var(--body); }
  .li-t .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .badge { flex: none; font: 500 11px var(--mono); letter-spacing: .06em;
    padding: 4px 9px; border-radius: 99px; }
  .badge.todo { color: var(--muted); border: 1px solid var(--line); }
  .badge.ok { color: var(--sage); background: var(--sage-soft); }

  /* ---------- экран урока ---------- */
  .back { display: inline-flex; align-items: center; gap: 7px;
    color: var(--clay); font: 500 14px var(--body); margin-bottom: 20px;
    cursor: pointer; user-select: none; }
  .chapter { font: 600 64px/1 var(--display); color: var(--clay-soft);
    -webkit-text-stroke: 1.5px var(--clay); margin-bottom: 2px; }
  :root[data-theme="dark"] .chapter, .chapter { }
  .card { background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 20px 18px; margin-bottom: 14px;
    box-shadow: var(--shadow); }
  .card h2 { font: 600 19px/1.3 var(--display); margin-bottom: 10px;
    display: flex; align-items: baseline; gap: 10px; }
  .num { font: 600 15px var(--mono); color: var(--clay); flex: none; }
  .card p { color: var(--muted); font-size: 14.5px; margin-bottom: 10px; }
  .card p:last-child { margin-bottom: 0; }
  .card b { color: var(--ink); font-weight: 600; }
  .card ul { margin: 0 0 10px 18px; color: var(--muted); font-size: 14.5px; }
  .card li { margin-bottom: 6px; }
  .card li::marker { color: var(--clay); }

  /* примеры-промпты как чат-пузыри */
  .ex { position: relative; background: var(--bubble); color: var(--ink);
    border-radius: 16px 16px 4px 16px; padding: 12px 14px;
    margin: 12px 0 12px 24px; font: 400 13px/1.55 var(--mono); }
  .ex::before { content: "промпт"; position: absolute; top: -8px; right: 12px;
    font: 500 9.5px var(--mono); letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); background: var(--card); padding: 1px 7px;
    border-radius: 99px; border: 1px solid var(--line); }
  .ex.good { background: var(--sage-soft); }
  .ex.good::before { content: "✓ сильный промпт"; color: var(--sage); }
  .ex.bad { background: var(--bad-soft); }
  .ex.bad::before { content: "✕ слабый промпт"; color: var(--bad); }

  .tip { display: flex; gap: 10px; background: var(--clay-soft);
    border-radius: 14px; padding: 13px 14px; font-size: 13.5px; margin: 12px 0 0;
    color: var(--ink); }
  .tip b { color: var(--clay); }

  /* ---------- квиз ---------- */
  .quiz-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .q { margin-bottom: 18px; }
  .q .qq { font: 600 15px/1.4 var(--body); margin-bottom: 10px; }
  .opt { background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; font-size: 14px; margin-bottom: 8px;
    cursor: pointer; user-select: none; transition: transform .1s ease; }
  .opt:active { transform: scale(.98); }
  .opt.right { background: var(--sage-soft); border-color: var(--sage); }
  .opt.wrong { background: var(--bad-soft); border-color: var(--bad); }
  .expl { display: none; font-size: 13px; color: var(--muted);
    padding: 9px 13px; border-left: 2px solid var(--clay); }
  .expl.show { display: block; }

  .finish { width: 100%; border: 0; border-radius: 13px; padding: 15px;
    font: 600 15px var(--body); cursor: pointer;
    background: var(--clay); color: #fff; margin-top: 6px;
    transition: opacity .15s; }
  .finish:focus-visible, .opt:focus-visible, .lesson-item:focus-visible {
    outline: 2px solid var(--clay); outline-offset: 2px; }
  .finish[disabled] { opacity: .35; cursor: default; }
  .finish.done { background: var(--sage-soft); color: var(--sage); }

  .foot { text-align: center; color: var(--muted); font-size: 12px;
    margin-top: 28px; font-family: var(--mono); }
  .foot b { color: var(--clay); font-weight: 500; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="home" class="view">
    <div class="spark" aria-hidden="true">
      <svg viewBox="0 0 34 34" fill="none">
        <path d="M17 2 L19.4 12.2 L27.6 6.4 L21.8 14.6 L32 17 L21.8 19.4 L27.6 27.6 L19.4 21.8 L17 32 L14.6 21.8 L6.4 27.6 L12.2 19.4 L2 17 L12.2 14.6 L6.4 6.4 L14.6 12.2 Z"
          fill="var(--clay)"/>
      </svg>
    </div>
    <div class="eyebrow">Claude 101 · курс для начинающих</div>
    <h1>Научись говорить с&nbsp;искусственным интеллектом</h1>
    <p class="lede" id="hello">Пять уроков — от первого запроса до уверенного пользователя.</p>
    <div class="progress" id="progressBar" aria-hidden="true"></div>
    <div class="progress-label" id="progressLabel"></div>
    <div class="toc" id="lessonList"></div>
    <div class="foot">бот-гид по обучению · <b>Claude 101</b></div>
  </div>

  <!-- ЭКРАН УРОКА -->
  <div id="lesson" class="view hidden">
    <div class="back" id="backBtn" role="button" tabindex="0">← Все уроки</div>
    <div class="chapter" id="lChapter" aria-hidden="true"></div>
    <div class="eyebrow" id="lKicker"></div>
    <h1 id="lTitle"></h1>
    <p class="lede" id="lSub"></p>
    <div id="lBody"></div>
    <div class="card">
      <div class="quiz-head"><span class="num">✳</span>
        <h2 style="margin:0">Проверь себя</h2></div>
      <div id="lQuiz"></div>
      <button class="finish" id="finishBtn"></button>
    </div>
    <div class="foot">урок <span id="lNum"></span> из 5 · <b>Claude 101</b></div>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

/* тема: следуем Telegram, иначе — системной */
try {
  if (tg.colorScheme) document.documentElement.dataset.theme = tg.colorScheme;
  tg.onEvent && tg.onEvent("themeChanged", () => {
    document.documentElement.dataset.theme = tg.colorScheme;
  });
} catch (e) {}

const u = tg.initDataUnsafe?.user;
if (u?.first_name) {
  document.getElementById("hello").textContent =
    u.first_name + ", впереди пять уроков — от первого запроса до уверенного пользователя.";
}

/* ================= КОНТЕНТ ================= */
const LESSONS = [
{
  title: "Знакомство с Claude",
  sub: "Что это такое и как сделать первый запрос",
  body: `
  <div class="card"><h2><span class="num">01</span>Что такое Claude</h2>
    <p><b>Claude</b> — ИИ-ассистент от компании Anthropic. Он читает и пишет тексты, объясняет сложное простыми словами, разбирает документы, помогает с работой, учёбой и кодом.</p>
    <p>Главное отличие от поисковика: Claude ведёт <b>диалог</b>. Google выдаёт ссылки — Claude даёт готовый ответ, который можно уточнять, переделывать и обсуждать.</p>
    <p>А ещё он честно скажет «не знаю» или «я не уверен» — и это нормально: ИИ не всезнающий, это инструмент.</p>
  </div>
  <div class="card"><h2><span class="num">02</span>Где им пользоваться</h2>
    <ul>
      <li><b>claude.ai</b> — сайт, работает в любом браузере. Есть бесплатный тариф.</li>
      <li><b>Приложение Claude</b> — для iPhone и Android, можно диктовать голосом.</li>
      <li><b>Claude Code</b> — версия для программистов в терминале.</li>
    </ul>
    <p>Для старта достаточно сайта: зайди на claude.ai, зарегистрируйся через Google — и можно писать.</p>
  </div>
  <div class="card"><h2><span class="num">03</span>Первый запрос (промпт)</h2>
    <p><b>Промпт</b> — это твоё сообщение для ИИ. Правило №1: <b>чем конкретнее вопрос — тем полезнее ответ</b>.</p>
    <div class="ex bad">Расскажи про еду</div>
    <div class="ex good">Составь меню ужина на двоих из курицы, риса и овощей. Время готовки — до 30 минут, с пошаговым рецептом</div>
    <p>Во втором случае Claude знает: что готовим, из чего, для кого, сколько времени и в каком виде дать ответ.</p>
  </div>
  <div class="card"><h2><span class="num">04</span>Это диалог, а не одноразовый вопрос</h2>
    <p>Ответ не обязан быть финальным. Не понравилось — так и скажи:</p>
    <div class="ex">— Слишком длинно, сократи в 2 раза<br>— Объясни проще, как для ребёнка<br>— Добавь примеры<br>— А теперь то же самое, но в шутливом тоне</div>
    <div class="tip"><span>💡</span><span><b>Совет ученика:</b> не бойся «глупых» вопросов. Claude не осуждает, не устаёт и может объяснить одно и то же десятью способами.</span></div>
  </div>`,
  quiz: [
    { q: "Чем Claude отличается от поисковика?", a: [
      ["Он ищет быстрее", 0, "Дело не в скорости — дело в формате: диалог вместо списка ссылок."],
      ["Он ведёт диалог и даёт готовые ответы", 1, "Верно! Можно уточнять, спорить и просить переделать."],
      ["Он всегда знает правильный ответ", 0, "Нет — ИИ может ошибаться, об этом будет отдельный урок."]
    ]},
    { q: "Какой промпт даст более полезный ответ?", a: [
      ["«Расскажи про спорт»", 0, "Слишком общий — ответ будет обо всём и ни о чём."],
      ["«Составь план тренировок дома на 3 дня в неделю для новичка без инвентаря»", 1, "Да! Есть цель, условия и формат — Claude ответит точно."]
    ]},
    { q: "Ответ получился слишком сложным. Что делать?", a: [
      ["Начать новый чат и надеяться на лучшее", 0, "Не нужно — просто продолжи диалог."],
      ["Написать «объясни проще, с примерами»", 1, "Именно! Уточнение в диалоге — главный инструмент."]
    ]}
  ]
},
{
  title: "Искусство промпта",
  sub: "Формула запроса, которая работает всегда",
  body: `
  <div class="card"><h2><span class="num">01</span>Формула РЗКФ</h2>
    <p>Сильный промпт состоит из четырёх частей:</p>
    <ul>
      <li><b>Роль</b> — кем должен быть Claude: «Ты опытный юрист…»</li>
      <li><b>Задача</b> — что сделать: «…проверь этот договор аренды…»</li>
      <li><b>Контекст</b> — что важно знать: «…я снимаю квартиру впервые…»</li>
      <li><b>Формат</b> — как оформить ответ: «…дай список рисков по пунктам».</li>
    </ul>
    <div class="ex good">Ты опытный HR-специалист. Улучши моё резюме для вакансии менеджера по продажам. Мне 25 лет, опыт — 2 года в рознице. Дай готовый текст + 3 совета, что подтянуть.</div>
  </div>
  <div class="card"><h2><span class="num">02</span>Покажи образец</h2>
    <p>Если нужен ответ в определённом стиле — покажи пример. Это называется «промпт с образцом», и это один из самых мощных приёмов:</p>
    <div class="ex">Напиши описание товара в таком стиле:<br>«Кружка-неваляшка — падает, но не сдаётся. Как ты по понедельникам».<br><br>Товары: плед с рукавами, настольная лампа</div>
    <p>Claude поймает интонацию из примера и продолжит в том же духе.</p>
  </div>
  <div class="card"><h2><span class="num">03</span>Одна задача за раз</h2>
    <p>Частая ошибка новичка — свалить всё в один запрос:</p>
    <div class="ex bad">Напиши бизнес-план, логотип, название, слоган и посчитай налоги</div>
    <p>Лучше по шагам: сначала название, обсудили → потом слоган → потом план. Каждый шаг опирается на предыдущий, и результат выходит сильно лучше.</p>
  </div>
  <div class="card"><h2><span class="num">04</span>Итерации — твоя суперсила</h2>
    <p>Первый ответ — черновик. Дожимай:</p>
    <div class="ex">— Дай 3 разных варианта<br>— Вариант 2 хорош, но сделай динамичнее<br>— Теперь сократи до одного абзаца<br>— Какие слабые места в этом тексте?</div>
    <div class="tip"><span>💡</span><span><b>Совет ученика:</b> попроси Claude покритиковать собственный ответ: «Найди 3 слабых места в том, что ты написал». Работает удивительно хорошо.</span></div>
  </div>`,
  quiz: [
    { q: "Из чего состоит формула сильного промпта?", a: [
      ["Роль, задача, контекст, формат", 1, "Верно! РЗКФ — база, которая улучшает почти любой запрос."],
      ["Вопрос, ответ, спасибо", 0, "Вежливость приятна, но на качество ответа влияет структура запроса."]
    ]},
    { q: "Нужен текст в особом стиле. Как проще всего этого добиться?", a: [
      ["Долго описывать стиль словами", 0, "Можно, но есть способ надёжнее."],
      ["Показать пример текста в нужном стиле", 1, "Да! Образец работает лучше любых описаний."]
    ]},
    { q: "Что не так с промптом «сделай сразу всё: план, текст, расчёты и дизайн»?", a: [
      ["Слишком много задач сразу — каждая выйдет поверхностной", 1, "Именно. Дели на шаги — получишь глубину."],
      ["Claude обидится", 0, "Не обидится :) Но качество каждой части будет ниже."]
    ]}
  ]
},
{
  title: "Тексты и документы",
  sub: "Сократить, переписать, проверить, перевести",
  body: `
  <div class="card"><h2><span class="num">01</span>Сжать длинное</h2>

    <p>Так можно «читать» многостраничные документы за минуту. На claude.ai файл можно просто прикрепить скрепкой — PDF, Word, даже фото текста.</p>
  </div>

  </div>
  <div class="card"><h2><span class="num">03</span>Улучшить своё</h2>

/* ================= ЛОГИКА ================= */
const KEY = "claude101_progress";
let progress = {};
try { progress = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) {}
function save() { try { localStorage.setItem(KEY, JSON.stringify(progress)); } catch (e) {} }

const $ = id => document.getElementById(id);
let current = null;

function replay(el) { el.classList.remove("view"); void el.offsetWidth; el.classList.add("view"); }

function renderHome() {
  $("home").classList.remove("hidden");
  $("lesson").classList.add("hidden");
  replay($("home"));
  window.scrollTo(0, 0);
  const doneCount = LESSONS.filter((_, i) => progress[i]).length;
  $("progressBar").innerHTML = LESSONS.map((_, i) =>
    `<span class="${progress[i] ? "done" : ""}"></span>`).join("");
  $("progressLabel").textContent = doneCount === LESSONS.length
    ? "курс пройден — поздравляем!"
    : "пройдено " + doneCount + " из " + LESSONS.length;
  $("lessonList").innerHTML = LESSONS.map((l, i) => `
    <div class="lesson-item ${progress[i] ? "done" : ""}" data-i="${i}" role="button" tabindex="0">
      <div class="ln">${i + 1}</div>
      <div class="li-t">
        <div class="name">${l.title}</div>
        <div class="sub">${l.sub}</div>
      </div>
      <div class="badge ${progress[i] ? "ok" : "todo"}">${progress[i] ? "пройден" : "≈7 мин"}</div>
    </div>`).join("");
  document.querySelectorAll(".lesson-item").forEach(el => {
    el.addEventListener("click", () => openLesson(+el.dataset.i));
    el.addEventListener("keydown", e => { if (e.key === "Enter") openLesson(+el.dataset.i); });
  });
}

function openLesson(i) {
  current = i;
  const l = LESSONS[i];
  $("home").classList.add("hidden");
  $("lesson").classList.remove("hidden");
  replay($("lesson"));
  window.scrollTo(0, 0);
  $("lChapter").textContent = "0" + (i + 1);
  $("lKicker").textContent = "Claude 101 · урок " + (i + 1) + " из 5";
  $("lTitle").textContent = l.title;
  $("lSub").textContent = l.sub;
  $("lNum").textContent = i + 1;
  $("lBody").innerHTML = l.body;

  $("lQuiz").innerHTML = l.quiz.map((q, qi) => `
    <div class="q" data-qi="${qi}">
      <div class="qq">${qi + 1}. ${q.q}</div>
      ${q.a.map((a, ai) => `<div class="opt" data-ai="${ai}" role="button" tabindex="0">${a[0]}</div>`).join("")}
      <div class="expl"></div>
    </div>`).join("");

  const answered = new Set();
  document.querySelectorAll("#lQuiz .q").forEach(qEl => {
    const qi = +qEl.dataset.qi;
    qEl.querySelectorAll(".opt").forEach(optEl => {
      const pick = () => {
        if (answered.has(qi)) return;
        answered.add(qi);
        const ai = +optEl.dataset.ai;
        const [ , correct, expl ] = LESSONS[i].quiz[qi].a[ai];
        optEl.classList.add(correct ? "right" : "wrong");
        if (!correct) {
          qEl.querySelectorAll(".opt").forEach(o => {
            if (LESSONS[i].quiz[qi].a[+o.dataset.ai][1]) o.classList.add("right");
          });
        }
        const explEl = qEl.querySelector(".expl");
        explEl.textContent = expl;
        explEl.classList.add("show");
        if (tg.HapticFeedback) { try {
          tg.HapticFeedback.notificationOccurred(correct ? "success" : "error");
        } catch (e) {} }
        updateFinish(answered.size === LESSONS[i].quiz.length);
      };
      optEl.addEventListener("click", pick);
      optEl.addEventListener("keydown", e => { if (e.key === "Enter") pick(); });
    });
  });
  updateFinish(false);
}

function updateFinish(enabled) {
  const btn = $("finishBtn");
  if (progress[current]) {
    btn.disabled = false; btn.classList.add("done");
    btn.textContent = "✓ Урок пройден — к списку уроков";
  } else {
    btn.classList.remove("done");
    btn.disabled = !enabled;
    btn.textContent = enabled ? "Завершить урок" : "Ответь на вопросы, чтобы завершить";
  }
}

$("finishBtn").addEventListener("click", () => {
  if (!progress[current]) {
    progress[current] = true; save();
    if (tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred("success"); } catch (e) {} }
  }
  renderHome();
});
$("backBtn").addEventListener("click", renderHome);
$("backBtn").addEventListener("keydown", e => { if (e.key === "Enter") renderHome(); });

renderHome();
</script>
