<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Личный кабинет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0e1621);
    --card: var(--tg-theme-secondary-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #f2f4f6);
    --muted: var(--tg-theme-hint-color, #708499);
    --accent: #f0b90b;
    --accent-dim: rgba(240, 185, 11, .14);
    --danger: #e05c4b;
    --ok: #35c76f;
    --ring-track: rgba(255, 255, 255, .07);
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text);
    font: 15px/1.45 -apple-system, "SF Pro Text", Roboto, "Segoe UI", sans-serif;
    -webkit-tap-highlight-color: transparent; }
  .wrap { max-width: 420px; margin: 0 auto; padding: 18px 16px 28px; }

  /* ---- шапка ---- */
  .head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .ava { width: 42px; height: 42px; border-radius: 12px; flex: none;
    background: var(--accent-dim); color: var(--accent);
    display: grid; place-items: center; font: 700 17px/1 var(--mono); }
  .who { min-width: 0; }
  .who .name { font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .who .login { font: 12px var(--mono); color: var(--muted); }
  .pill { margin-left: auto; flex: none; font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 99px; }
  .pill.on  { color: var(--ok); background: rgba(53, 199, 111, .12); }
  .pill.off { color: var(--danger); background: rgba(224, 92, 75, .12); }

  /* ---- кольцо-таймер (фирменный элемент) ---- */
  .gauge { position: relative; width: 248px; height: 248px; margin: 0 auto 8px; }
  .gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge circle { fill: none; stroke-width: 9; stroke-linecap: round; }
  .track { stroke: var(--ring-track); }
  .bar { stroke: var(--accent); transition: stroke-dashoffset .9s cubic-bezier(.4, 0, .2, 1); }
  .bar.expired { stroke: var(--ring-track); }
  .gauge .center { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px; text-align: center; }
  .days { font: 700 52px/1 var(--mono); letter-spacing: -2px; font-variant-numeric: tabular-nums; }
  .days small { font-size: 17px; letter-spacing: 0; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .hms { font: 500 16px var(--mono); color: var(--accent); font-variant-numeric: tabular-nums; }
  .hms.expired { color: var(--muted); }
  .until { font-size: 12px; color: var(--muted); }

  .caption { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  /* ---- продление ---- */
  .sect { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); margin: 0 2px 10px; }
  .paygrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .paybtn { border: 0; border-radius: 14px; background: var(--card); color: var(--text);
    padding: 14px 12px; text-align: left; font: inherit; cursor: pointer;
    display: flex; flex-direction: column; gap: 3px; }
  .paybtn:active { transform: scale(.97); }
  .paybtn .m { font-weight: 650; font-size: 14px; }
  .paybtn .p { font: 12px var(--mono); color: var(--muted); }
  .paybtn.hot { background: var(--accent-dim); outline: 1px solid rgba(240, 185, 11, .35); }
  .paybtn.hot .p { color: var(--accent); }
  .paybtn[disabled] { opacity: .45; }

  /* ---- инфо ---- */
  .meta { background: var(--card); border-radius: 14px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 9px; font-size: 13px; }
  .meta .row { display: flex; justify-content: space-between; gap: 12px; }
  .meta .k { color: var(--muted); }
  .meta a { color: var(--accent); text-decoration: none; }

  .err { text-align: center; color: var(--danger); padding: 40px 20px; }
  .loading { text-align: center; color: var(--muted); padding: 60px 0; font: 14px var(--mono); }
  @media (prefers-reduced-motion: reduce) { .bar { transition: none; } }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">загрузка…</div></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const CIRC = 2 * Math.PI * 114; // r=114
let state = null, tick = null;

async function api(path, body) {
  const r = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Init-Data": tg.initData },
    body: JSON.stringify(body || {}),
  });
  if (!r.ok) throw new Error("api " + r.status);
  return r.json();
}

function fmt(n) { return String(n).padStart(2, "0"); }

function render() {
  const u = tg.initDataUnsafe?.user || {};
  const name = [u.first_name, u.last_name].filter(Boolean).join(" ") || "Пользователь";
  const initial = (u.first_name || "?")[0].toUpperCase();
  const active = state.active;
  const untilDate = active ? new Date(state.until) : null;

  document.getElementById("app").innerHTML = `
    <div class="head">
      <div class="ava">${initial}</div>
      <div class="who">
        <div class="name">${name}</div>
        <div class="login">id ${u.id || "—"}</div>
      </div>
      <div class="pill ${active ? "on" : "off"}">${active ? "Активна" : "Нет подписки"}</div>
    </div>

    <div class="gauge">
      <svg viewBox="0 0 248 248">
        <circle class="track" cx="124" cy="124" r="114"></circle>
        <circle class="bar ${active ? "" : "expired"}" cx="124" cy="124" r="114"
          stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}" id="bar"></circle>
      </svg>
      <div class="center">
        <div class="days" id="days">—</div>
        <div class="hms ${active ? "" : "expired"}" id="hms">${active ? "" : "доступ закрыт"}</div>
        <div class="until">${active ? "до " + untilDate.toLocaleDateString("ru-RU") : "оформите подписку"}</div>
      </div>
    </div>
    <div class="caption">${active ? "осталось до конца подписки" : "оплата — и одноразовый инвайт придёт в чат с ботом"}</div>

    <div class="sect">${active ? "Продлить" : "Оформить"} · ${state.tariff.days} дней</div>
    <div class="paygrid">
      <button class="paybtn hot" data-m="crypto"><span class="m">Криптовалюта</span><span class="p">${state.tariff.usdt} USDT · −5%</span></button>
      <button class="paybtn" data-m="sbp"><span class="m">СБП</span><span class="p">${state.tariff.rub} ₽</span></button>
      <button class="paybtn" data-m="cryptobot"><span class="m">Crypto Bot</span><span class="p">${state.tariff.usdt} USDT</span></button>
      <button class="paybtn" data-m="stars"><span class="m">TG Звёзды</span><span class="p">${state.tariff.stars} ⭐</span></button>
    </div>

    <div class="meta">
      <div class="row"><span class="k">Тариф</span><span>${state.tariff.rub} ₽ / ${state.tariff.days} дней</span></div>
      <div class="row"><span class="k">Поддержка</span><a href="https://t.me/${state.support.replace("@","")}">${state.support}</a></div>
    </div>`;

  document.querySelectorAll(".paybtn").forEach(b => b.addEventListener("click", () => pay(b)));

  if (active) startTicker(untilDate);
  requestAnimationFrame(() => setRing());
}

function setRing() {
  if (!state.active) return;
  const total = state.tariff.days * 86400000;
  const left = Math.max(0, new Date(state.until) - Date.now());
  const frac = Math.min(1, left / total);
  document.getElementById("bar").style.strokeDashoffset = CIRC * (1 - frac);
}

function startTicker(until) {
  clearInterval(tick);
  const step = () => {
    let ms = until - Date.now();
    if (ms <= 0) { clearInterval(tick); load(); return; }
    const d = Math.floor(ms / 86400000);
    const h = Math.floor(ms / 3600000) % 24;
    const m = Math.floor(ms / 60000) % 60;
    const s = Math.floor(ms / 1000) % 60;
    document.getElementById("days").innerHTML = d + "<small>дн</small>";
    document.getElementById("hms").textContent = `${fmt(h)}:${fmt(m)}:${fmt(s)}`;
  };
  step();
  tick = setInterval(step, 1000);
}

async function pay(btn) {
  btn.disabled = true;
  try {
    const res = await api("/api/pay", { method: btn.dataset.m });
    if (res.type === "stars") {
      tg.openInvoice(res.url, (status) => { if (status === "paid") setTimeout(load, 1500); });
    } else if (res.type === "telegram") {
      tg.openTelegramLink(res.url);
    } else {
      tg.openLink(res.url);
    }
  } catch (e) {
    tg.showAlert("Не удалось создать платёж. Попробуйте позже или напишите в поддержку.");
  }
  btn.disabled = false;
}

async function load() {
  try {
    state = await api("/api/me");
    render();
  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="err">Не удалось загрузить данные.<br>Откройте кабинет заново из бота.</div>`;
  }
}
load();
</script>
</body>
</html>
